<section class="auth-card" aria-labelledby="admin-login-title">
  <h1 id="admin-login-title">Admin Login</h1>
  <p class="subtitle">Traditional Chinese Lesson Management Workspace</p>

  <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
    <label for="admin-email">Admin Email</label>
    <input id="admin-email" type="email" formControlName="email" autocomplete="username" />

    <label for="admin-password">Password</label>
    <input
      id="admin-password"
      type="password"
      formControlName="password"
      autocomplete="current-password"
    />

    @if (authService.errorMessage()) {
      <p class="error" role="alert">{{ authService.errorMessage() }}</p>
    }

    <button type="submit" [disabled]="authService.isLoading()">Sign In</button>
  </form>
</section>
