<div class="app-shell">
  <header class="topbar">
    <div class="brand-block">
      <p class="seal">漢學</p>
      <div>
        <p class="brand-title">Traditional Chinese Study</p>
        <p class="brand-subtitle">Vocabulary, grammar, dialogue, and quick tests</p>
      </div>
    </div>

    <nav class="main-nav" aria-label="Primary">
      <a class="interactive-soft-hover interactive-active-contrast" routerLink="/learn" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: false }">
        Learn
      </a>
      <a class="interactive-soft-hover interactive-active-contrast" routerLink="/admin" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: false }">
        Admin
      </a>
      @if (!authService.isAuthenticated()) {
        <a class="interactive-soft-hover interactive-active-contrast" routerLink="/auth/login" routerLinkActive="active-link">Sign In</a>
      } @else {
        <button class="interactive-soft-hover" type="button" (click)="logout()">Sign Out</button>
      }
    </nav>
  </header>

  <main class="content-area" [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </main>
</div>
