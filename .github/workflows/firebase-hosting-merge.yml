name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm config set registry https://registry.npmjs.org
      - run: npx --yes npm@11.12.1 ci
      - run: npx --yes npm@11.12.1 run build -- --configuration production
      - name: Write Firebase service account file
        run: |
          cat > "$RUNNER_TEMP/firebaseServiceAccount.json" << 'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          EOF
      - name: Deploy Realtime Database rules
        run: npx firebase-tools deploy --only database --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebaseServiceAccount.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
